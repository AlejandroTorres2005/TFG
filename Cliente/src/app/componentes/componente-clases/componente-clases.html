<div class="clases-container">
  <div class="header">
    <h1>Clases</h1>
    <span class="badge">{{ clases.length }} clase{{ clases.length !== 1 ? 's' : '' }}</span>
  </div>

  <div *ngIf="clases.length === 0" class="vacio">No hay clases registradas.</div>

  <div class="clases-grid">
    <div *ngFor="let clase of clases" class="clase-card">
      <div class="card-top">
        <h3>{{ clase.nombre }}</h3>
      </div>
      <div class="card-body">
        <div class="info-row">
          <span class="icon">👤</span>
          <span>{{ clase.profesor }}</span>
        </div>
        <div class="info-row" *ngIf="clase.aula">
          <span class="icon">🏫</span>
          <span>Aula {{ clase.aula }}</span>
        </div>
        <div class="info-row">
          <span class="icon">🕐</span>
          <span>{{ clase.horario }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
