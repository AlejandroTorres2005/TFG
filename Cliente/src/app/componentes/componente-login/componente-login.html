<div class="form-container">
  <h2>Login de usuario</h2>

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Codigo de usuario</label>
      <input type="text" [(ngModel)]="codigo" name="codigo" />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <div class="password-wrapper">
        <input [type]="mostrarClave ? 'text' : 'password'" [(ngModel)]="clave" name="clave" />
        <button type="button" class="toggle-password" (click)="mostrarClave = !mostrarClave">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            @if (!mostrarClave) {
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            } @else {
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
            }
          </svg>
        </button>
      </div>
    </div>

    @if (errorMsg) {
      <div class="error">{{ errorMsg }}</div>
    }

    <button type="submit" [disabled]="cargando">{{ cargando ? 'Entrando...' : 'Acceder' }}</button>

    <p class="registro-link">
      ¿No tienes cuenta? <a routerLink="/registro" class="registro-link">Regístrate</a>
    </p>
  </form>
</div>
